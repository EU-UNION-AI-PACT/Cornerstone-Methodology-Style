name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Netlify CLI
        run: |
          git clone https://github.com/netlify/cli.git /tmp/netlify-cli
          cd /tmp/netlify-cli
          npm ci
          npm run build
          npm install -g /tmp/netlify-cli
          cd -
          
      - name: Verify Netlify CLI
        run: netlify --version
        
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy --prod --dir=. --message="Deploy from GitHub Actions - $(date)"
